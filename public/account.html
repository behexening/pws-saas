<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Account — akFISHinfo</title>
  <style>
    @font-face {
      font-family: 'Blackbird';
      src: url('/static/projekt-blackbird-v2.otf') format('opentype');
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:      #060a0f;
      --surface: #0d1520;
      --border:  #1a2d3f;
      --text:    #dde8f4;
      --muted:   #5a7288;
      --accent:  #00b4d8;
      --open:    #22c55e;
      --warn:    #f59e0b;
      --red:     #ef4444;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
      -webkit-font-smoothing: antialiased;
      font-size: 14px;
      min-height: 100vh;
    }

    /* Nav */
    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 22px;
      height: 50px;
      background: rgba(6, 10, 15, 0.95);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .wordmark {
      font-family: 'Blackbird', sans-serif;
      font-size: 19px;
      letter-spacing: 0.03em;
      color: var(--text);
      user-select: none;
    }
    .wordmark em { font-style: normal; color: var(--accent); }
    .nav-links { display: flex; gap: 18px; align-items: center; }
    .nav-link {
      color: var(--muted);
      text-decoration: none;
      font-size: 12px;
      font-weight: 500;
      transition: color 0.15s;
    }
    .nav-link:hover { color: var(--text); }
    .nav-link.active { color: var(--text); }

    /* Page */
    .page {
      max-width: 600px;
      margin: 44px auto;
      padding: 0 20px 60px;
    }
    h1 {
      font-family: 'Blackbird', sans-serif;
      font-size: 1.6rem;
      letter-spacing: 0.01em;
      margin-bottom: 4px;
    }
    .page-sub { color: var(--muted); font-size: 12px; margin-bottom: 32px; }

    /* Cards */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 5px;
      padding: 18px 20px;
      margin-bottom: 14px;
    }
    .card-title {
      font-size: 9px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: var(--muted);
      margin-bottom: 14px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border);
    }

    /* Info rows */
    .info-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid rgba(26,45,63,0.5);
      font-size: 13px;
    }
    .info-row:last-child { border-bottom: none; }
    .info-label { color: var(--muted); font-size: 11px; }

    /* Badges */
    .badge {
      display: inline-block;
      font-size: 9px;
      font-weight: 800;
      padding: 2px 8px;
      border-radius: 2px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .badge-pro       { background: rgba(0,180,216,0.12); color: var(--accent); border: 1px solid rgba(0,180,216,0.25); }
    .badge-trial     { background: rgba(245,158,11,0.12); color: var(--warn);   border: 1px solid rgba(245,158,11,0.28); }
    .badge-free      { background: rgba(90,114,136,0.12); color: var(--muted);  border: 1px solid var(--border); }
    .badge-gov       { background: rgba(34,197,94,0.12);  color: var(--open);   border: 1px solid rgba(34,197,94,0.25); }
    .badge-ok        { background: rgba(34,197,94,0.12);  color: var(--open);   border: 1px solid rgba(34,197,94,0.25); }
    .badge-warn      { background: rgba(245,158,11,0.12); color: var(--warn);   border: 1px solid rgba(245,158,11,0.28); }

    /* Fields */
    .field { margin-bottom: 12px; }
    .field label {
      display: block;
      font-size: 9px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      margin-bottom: 5px;
    }
    .field input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text);
      font-size: 13px;
      padding: 8px 11px;
      outline: none;
      font-family: inherit;
      transition: border-color 0.15s;
    }
    .field input:focus { border-color: var(--accent); }
    .field input[readonly] { color: var(--muted); cursor: default; }

    /* Buttons */
    .btn {
      display: inline-block;
      padding: 7px 16px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      cursor: pointer;
      border: none;
      font-family: inherit;
      text-decoration: none;
      transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.82; }
    .btn-primary { background: var(--accent); color: #000; }
    .btn-ghost   { background: transparent; color: var(--muted); border: 1px solid var(--border); }
    .action-row  { display: flex; justify-content: flex-end; margin-top: 8px; }

    /* Alerts */
    .alert {
      border-radius: 4px;
      padding: 9px 12px;
      font-size: 12px;
      margin-bottom: 12px;
      display: none;
    }
    .alert-ok  { background: rgba(34,197,94,0.10); border: 1px solid rgba(34,197,94,0.25); color: #4ade80; }
    .alert-err { background: rgba(239,68,68,0.10); border: 1px solid rgba(239,68,68,0.25); color: #f87171; }

    /* Verify nudge */
    .verify-nudge {
      background: rgba(245,158,11,0.07);
      border: 1px solid rgba(245,158,11,0.22);
      border-radius: 5px;
      padding: 10px 14px;
      font-size: 12px;
      color: var(--warn);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }
    .verify-btn {
      background: none;
      border: 1px solid rgba(245,158,11,0.35);
      color: var(--warn);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      padding: 4px 10px;
      border-radius: 3px;
      cursor: pointer;
      font-family: inherit;
      white-space: nowrap;
      flex-shrink: 0;
      transition: opacity 0.15s;
    }
    .verify-btn:hover { opacity: 0.8; }
    h2.card-title { font-size: 9px; }
    .skip-link {
      position: absolute; top: -40px; left: 8px;
      background: var(--accent); color: #000;
      padding: 6px 12px; border-radius: 0 0 4px 4px;
      font-size: 12px; font-weight: 700; text-decoration: none;
      z-index: 9999; transition: top 0.15s;
    }
    .skip-link:focus { top: 0; }
  </style>
</head>
<body>
<a href="#main" class="skip-link">Skip to content</a>

<nav>
  <a href="/" style="text-decoration:none"><div class="wordmark">akFISH<em>info.</em></div></a>
  <div class="nav-links">
    <a href="/app"         class="nav-link">map</a>
    <a href="/about"       class="nav-link">about</a>
    <a href="/account"     class="nav-link active">account</a>
    <a href="/auth/logout" class="nav-link">sign out</a>
  </div>
</nav>

<main id="main">
<div class="page">
  <h1>Account</h1>
  <p class="page-sub" id="page-sub">Loading...</p>

  <div class="verify-nudge" id="verify-nudge" style="display:none">
    <span>Your email address has not been verified. Check your inbox.</span>
    <button class="verify-btn" onclick="resendVerification()">Resend</button>
  </div>

  <!-- Subscription -->
  <div class="card">
    <h2 class="card-title">Subscription</h2>
    <div class="info-row">
      <span class="info-label">Plan</span>
      <span id="acc-tier">—</span>
    </div>
    <div class="info-row">
      <span class="info-label">Status</span>
      <span id="acc-status">—</span>
    </div>
    <div class="info-row" id="acc-trial-row" style="display:none">
      <span class="info-label">Trial ends</span>
      <span id="acc-trial-end">—</span>
    </div>
  </div>

  <!-- Profile -->
  <div class="card">
    <h2 class="card-title">Profile</h2>
    <div class="alert alert-ok"  id="profile-ok">Saved.</div>
    <div class="alert alert-err" id="profile-err"></div>
    <div class="field">
      <label for="acc-name">Name</label>
      <input type="text"  id="acc-name"  autocomplete="name" />
    </div>
    <div class="field">
      <label for="acc-email">Email</label>
      <input type="email" id="acc-email" readonly />
    </div>
    <div class="field">
      <label for="acc-phone">Phone</label>
      <input type="text"  id="acc-phone" readonly />
    </div>
    <div class="action-row">
      <button class="btn btn-primary" onclick="saveProfile()">Save name</button>
    </div>
  </div>

  <!-- Password (hidden for Google-only accounts) -->
  <div class="card" id="password-card">
    <h2 class="card-title">Change Password</h2>
    <div class="alert alert-ok"  id="pw-ok">Password updated.</div>
    <div class="alert alert-err" id="pw-err"></div>
    <div class="field">
      <label for="pw-current">Current password</label>
      <input type="password" id="pw-current" autocomplete="current-password" />
    </div>
    <div class="field">
      <label for="pw-new">New password</label>
      <input type="password" id="pw-new" placeholder="Min 8 characters" autocomplete="new-password" />
    </div>
    <div class="action-row">
      <button class="btn btn-primary" onclick="changePassword()">Update password</button>
    </div>
  </div>

  <!-- Session -->
  <div class="card">
    <h2 class="card-title">Session</h2>
    <div style="display:flex;justify-content:space-between;align-items:center;">
      <span style="font-size:12px;color:var(--muted)">Signed in on this device.</span>
      <a href="/auth/logout" class="btn btn-ghost">Sign out</a>
    </div>
  </div>
</div>
</main>

<script>
let currentUser = null;

async function loadAccount() {
  const r = await fetch('/api/me');
  const { user } = await r.json();
  if (!user) { window.location.href = '/login'; return; }
  currentUser = user;

  document.getElementById('page-sub').textContent = user.email;

  if (!user.email_verified && !user.has_google) {
    document.getElementById('verify-nudge').style.display = 'flex';
  }

  // Subscription display
  let tierHtml, statusHtml;
  if (user.is_admin) {
    tierHtml   = '<span class="badge badge-gov">Admin</span>';
    statusHtml = '<span class="badge badge-ok">Full access</span>';
  } else if (user.email && user.email.endsWith('@alaska.gov')) {
    tierHtml   = '<span class="badge badge-gov">ADF&G / State</span>';
    statusHtml = '<span class="badge badge-ok">Free — state employee</span>';
  } else if (user.tier === 'pro' && user.subscription_active) {
    tierHtml   = '<span class="badge badge-pro">Pro</span>';
    statusHtml = '<span class="badge badge-ok">Active</span>';
  } else if (user.trial_active) {
    tierHtml   = '<span class="badge badge-trial">Trial</span>';
    statusHtml = `<span class="badge badge-trial">${user.trial_days_left}d remaining</span>`;
    document.getElementById('acc-trial-row').style.display = 'flex';
    document.getElementById('acc-trial-end').textContent =
      new Date(user.trial_ends_at).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
  } else {
    tierHtml   = '<span class="badge badge-free">Free</span>';
    statusHtml = '<span class="badge badge-warn">No active subscription</span>';
  }
  document.getElementById('acc-tier').innerHTML   = tierHtml;
  document.getElementById('acc-status').innerHTML = statusHtml;

  document.getElementById('acc-name').value  = user.name         || '';
  document.getElementById('acc-email').value = user.email        || '';
  document.getElementById('acc-phone').value = user.phone_number || '—';

  if (user.has_google && !user.password_hash_exists) {
    document.getElementById('password-card').style.display = 'none';
  }
}

async function saveProfile() {
  const name = document.getElementById('acc-name').value.trim();
  if (!name) return;
  const r = await fetch('/api/account', {
    method: 'PATCH',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name }),
  });
  const d = await r.json();
  showAlert('profile-ok', 'profile-err', r.ok ? null : (d.error || 'Could not save.'));
}

async function changePassword() {
  const current_password = document.getElementById('pw-current').value;
  const new_password     = document.getElementById('pw-new').value;
  const r = await fetch('/api/account', {
    method: 'PATCH',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ current_password, new_password }),
  });
  const d = await r.json();
  if (r.ok) {
    document.getElementById('pw-current').value = '';
    document.getElementById('pw-new').value     = '';
  }
  showAlert('pw-ok', 'pw-err', r.ok ? null : (d.error || 'Could not update password.'));
}

async function resendVerification() {
  const btn = event.target;
  btn.textContent = 'Sending...';
  btn.disabled = true;
  const r = await fetch('/api/resend-verification', { method: 'POST' });
  btn.textContent = r.ok ? 'Sent' : 'Failed';
  setTimeout(() => { btn.textContent = 'Resend'; btn.disabled = false; }, 4000);
}

function showAlert(okId, errId, errMsg) {
  const ok  = document.getElementById(okId);
  const err = document.getElementById(errId);
  if (errMsg) {
    err.textContent  = errMsg;
    err.style.display = 'block';
    ok.style.display  = 'none';
  } else {
    ok.style.display  = 'block';
    err.style.display = 'none';
    setTimeout(() => { ok.style.display = 'none'; }, 3000);
  }
}

loadAccount();
</script>
</body>
</html>
