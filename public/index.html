<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>akFISHinfo — Prince William Sound Salmon Alerts</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg: #0f1117;
            --surface: #1a1d27;
            --border: #2e3250;
            --text: #e8eaf6;
            --muted: #8890b0;
            --blue: #5b8dee;
        }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
            min-height: 100vh;
        }

        /* Nav */
        nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 32px;
            height: 52px;
            border-bottom: 1px solid var(--border);
            background: var(--surface);
        }
        .wordmark {
            font-size: 18px;
            font-weight: 700;
            letter-spacing: -0.04em;
        }
        .wordmark span { color: var(--blue); }
        .nav-links { display: flex; gap: 20px; align-items: center; }
        .nav-link {
            color: var(--muted);
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
            transition: color 0.15s;
        }
        .nav-link:hover { color: var(--text); }
        .btn-primary {
            background: var(--blue);
            color: white;
            padding: 7px 16px;
            border-radius: 5px;
            font-size: 13px;
            font-weight: 600;
            text-decoration: none;
            transition: opacity 0.15s;
        }
        .btn-primary:hover { opacity: 0.85; }

        /* Hero — placeholder until user fills in content */
        .hero {
            max-width: 760px;
            margin: 120px auto;
            padding: 0 32px;
            text-align: center;
        }
        .hero h1 {
            font-size: clamp(2rem, 5vw, 3.2rem);
            font-weight: 700;
            letter-spacing: -0.04em;
            line-height: 1.1;
            margin-bottom: 1.2rem;
        }
        .hero h1 span { color: var(--blue); }
        .hero p {
            color: var(--muted);
            font-size: 1.05rem;
            line-height: 1.7;
            max-width: 540px;
            margin: 0 auto 2.5rem;
        }
        .cta-group {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .btn-lg {
            padding: 12px 28px;
            border-radius: 6px;
            font-size: 0.95rem;
            font-weight: 600;
            text-decoration: none;
            transition: opacity 0.15s;
        }
        .btn-lg-primary { background: var(--blue); color: white; }
        .btn-lg-primary:hover { opacity: 0.85; }
        .btn-lg-ghost {
            border: 1px solid var(--border);
            color: var(--muted);
        }
        .btn-lg-ghost:hover { color: var(--text); border-color: var(--muted); }
    </style>
</head>
<body>
    <nav>
        <div class="wordmark">akFISH<span>info.</span></div>
        <div class="nav-links">
            <a href="/login" class="nav-link" id="app-link">sign in</a>
            <a href="/login" class="btn-primary">Get started</a>
        </div>
    </nav>

    <!-- Hero — fill in your copy here -->
    <div class="hero">
        <h1>Real-time <span>salmon alerts</span> for Prince William Sound</h1>
        <p>Instant SMS notifications the moment ADF&amp;G opens a district. Know before you go.</p>
        <div class="cta-group">
            <a href="/login" class="btn-lg btn-lg-primary">Start free trial</a>
            <a href="/app" class="btn-lg btn-lg-ghost">View map →</a>
        </div>
    </div>

    <script>
        // If already logged in, swap "sign in" for "open app"
        fetch('/api/me').then(r => r.json()).then(({ user }) => {
            if (!user) return;
            const link = document.getElementById('app-link');
            link.href = user.has_access ? '/app' : '/pricing';
            link.textContent = 'open app';
        });
    </script>
</body>
</html>
