<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In — AK Fish Info</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0d1117;
            color: #e6edf3;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }
        .card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 2.5rem 2rem;
            max-width: 400px;
            width: 100%;
            text-align: center;
        }
        .logo-text { font-size: 1.4rem; font-weight: 800; letter-spacing: -0.04em; margin-bottom: 0.5rem; color: #e6edf3; }
        .logo-text span { color: #58a6ff; }
        h1 { font-size: 1.4rem; color: #e6edf3; margin-bottom: 0.4rem; }
        .sub { color: #8b949e; font-size: 0.9rem; margin-bottom: 2rem; }
        .btn-google {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            padding: 12px 16px;
            background: #ffffff;
            color: #3c4043;
            border: none;
            border-radius: 6px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: background 0.15s;
        }
        .btn-google:hover { background: #f1f3f4; }
        .btn-google svg { flex-shrink: 0; }
        .divider { color: #30363d; margin: 1.5rem 0; font-size: 0.85rem; }
        .back { color: #58a6ff; text-decoration: none; font-size: 0.85rem; }
        .back:hover { text-decoration: underline; }
        .error-msg {
            background: #3d1a1a;
            border: 1px solid #7d2d2d;
            color: #f87171;
            border-radius: 6px;
            padding: 0.75rem 1rem;
            font-size: 0.85rem;
            margin-bottom: 1.5rem;
            display: none;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo-text">akFISH<span>info.</span></div>
        <h1>AK Fish Info</h1>
        <p class="sub">Real-time Prince William Sound salmon alerts</p>

        <div class="error-msg" id="errorMsg">
            Sign-in failed. Please try again.
        </div>

        <a href="/auth/google" class="btn-google">
            <svg width="18" height="18" viewBox="0 0 18 18">
                <path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z"/>
                <path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z"/>
                <path fill="#FBBC05" d="M3.964 10.707A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.707V4.961H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.039l3.007-2.332z"/>
                <path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.961L3.964 7.293C4.672 5.166 6.656 3.58 9 3.58z"/>
            </svg>
            Continue with Google
        </a>

        <p class="divider">— or —</p>

        <!-- Email sign-in form (shown by default) -->
        <form id="email-signin-form" onsubmit="doSignIn(event)">
            <input type="email" id="si-email" placeholder="Email" required autocomplete="email" style="width:100%;padding:10px 12px;background:#0d1117;border:1px solid #30363d;border-radius:6px;color:#e6edf3;font-size:0.9rem;margin-bottom:8px;outline:none;" />
            <input type="password" id="si-password" placeholder="Password" required autocomplete="current-password" style="width:100%;padding:10px 12px;background:#0d1117;border:1px solid #30363d;border-radius:6px;color:#e6edf3;font-size:0.9rem;margin-bottom:10px;outline:none;" />
            <label style="display:flex;align-items:center;gap:8px;font-size:0.82rem;color:#8b949e;margin-bottom:12px;cursor:pointer;text-align:left;">
                <input type="checkbox" id="si-remember" style="accent-color:#58a6ff;width:14px;height:14px;" />
                Stay signed in for 30 days
            </label>
            <button type="submit" style="width:100%;padding:11px;background:#238636;border:none;border-radius:6px;color:white;font-size:0.9rem;font-weight:600;cursor:pointer;">Sign in</button>
        </form>

        <!-- Email sign-up form (hidden by default) -->
        <form id="email-signup-form" style="display:none;" onsubmit="doSignUp(event)">
            <input type="text" id="su-name" placeholder="Full name" required autocomplete="name" style="width:100%;padding:10px 12px;background:#0d1117;border:1px solid #30363d;border-radius:6px;color:#e6edf3;font-size:0.9rem;margin-bottom:8px;outline:none;" />
            <input type="email" id="su-email" placeholder="Email" required autocomplete="email" style="width:100%;padding:10px 12px;background:#0d1117;border:1px solid #30363d;border-radius:6px;color:#e6edf3;font-size:0.9rem;margin-bottom:8px;outline:none;" />
            <input type="password" id="su-password" placeholder="Password (min 8 characters)" required minlength="8" autocomplete="new-password" style="width:100%;padding:10px 12px;background:#0d1117;border:1px solid #30363d;border-radius:6px;color:#e6edf3;font-size:0.9rem;margin-bottom:10px;outline:none;" />
            <label style="display:flex;align-items:center;gap:8px;font-size:0.82rem;color:#8b949e;margin-bottom:12px;cursor:pointer;text-align:left;">
                <input type="checkbox" id="su-remember" style="accent-color:#58a6ff;width:14px;height:14px;" />
                Stay signed in for 30 days
            </label>
            <button type="submit" style="width:100%;padding:11px;background:#238636;border:none;border-radius:6px;color:white;font-size:0.9rem;font-weight:600;cursor:pointer;">Create account</button>
        </form>

        <p style="margin-top:14px;font-size:0.82rem;color:#8b949e;">
            <span id="toggle-label">Don't have an account?</span>
            <a href="#" id="toggle-link" onclick="toggleForm(event)" style="color:#58a6ff;text-decoration:none;margin-left:4px;">Sign up</a>
        </p>

        <p style="margin-top:18px;"><a href="/" class="back">← Back to homepage</a></p>
    </div>

    <script>
        // Show error if Google auth failed
        if (new URLSearchParams(location.search).get('error')) {
            document.getElementById('errorMsg').style.display = 'block';
        }

        let showingSignUp = false;

        function toggleForm(e) {
            e.preventDefault();
            showingSignUp = !showingSignUp;
            document.getElementById('email-signin-form').style.display = showingSignUp ? 'none' : 'block';
            document.getElementById('email-signup-form').style.display = showingSignUp ? 'block' : 'none';
            document.getElementById('toggle-label').textContent = showingSignUp ? 'Already have an account?' : 'Don\'t have an account?';
            document.getElementById('toggle-link').textContent = showingSignUp ? 'Sign in' : 'Sign up';
            document.getElementById('errorMsg').style.display = 'none';
        }

        function showError(msg) {
            const el = document.getElementById('errorMsg');
            el.textContent = msg;
            el.style.display = 'block';
        }

        async function doSignIn(e) {
            e.preventDefault();
            const email       = document.getElementById('si-email').value.trim();
            const password    = document.getElementById('si-password').value;
            const remember_me = document.getElementById('si-remember').checked;
            try {
                const r = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password, remember_me }),
                });
                const d = await r.json();
                if (!r.ok) { showError(d.error || 'Sign-in failed.'); return; }
                window.location.href = d.redirect;
            } catch {
                showError('Connection error. Please try again.');
            }
        }

        async function doSignUp(e) {
            e.preventDefault();
            const name        = document.getElementById('su-name').value.trim();
            const email       = document.getElementById('su-email').value.trim();
            const password    = document.getElementById('su-password').value;
            const remember_me = document.getElementById('su-remember').checked;
            try {
                const r = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, password, remember_me }),
                });
                const d = await r.json();
                if (!r.ok) { showError(d.error || 'Sign-up failed.'); return; }
                window.location.href = d.redirect;
            } catch {
                showError('Connection error. Please try again.');
            }
        }
    </script>
</body>
</html>
