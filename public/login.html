<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — akFISHinfo</title>
  <style>
    @font-face {
      font-family: 'Blackbird';
      src: url('/static/projekt-blackbird-v2.otf') format('opentype');
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:      #060a0f;
      --surface: #0d1520;
      --border:  #1a2d3f;
      --text:    #dde8f4;
      --muted:   #5a7288;
      --accent:  #00b4d8;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .wordmark {
      font-family: 'Blackbird', sans-serif;
      font-size: 22px;
      letter-spacing: 0.03em;
      color: var(--text);
      margin-bottom: 28px;
      user-select: none;
    }
    .wordmark em { font-style: normal; color: var(--accent); }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 28px 26px;
      width: 100%;
      max-width: 380px;
    }
    h1 {
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 4px;
      letter-spacing: -0.02em;
    }
    .sub {
      color: var(--muted);
      font-size: 0.8rem;
      margin-bottom: 22px;
    }
    .btn-google {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 10px 14px;
      background: #fff;
      color: #3c4043;
      border: none;
      border-radius: 4px;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: opacity 0.15s;
    }
    .btn-google:hover { opacity: 0.9; }
    .divider {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 18px 0;
      color: var(--border);
      font-size: 11px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }
    input {
      width: 100%;
      padding: 9px 12px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text);
      font-size: 0.875rem;
      font-family: inherit;
      margin-bottom: 8px;
      outline: none;
      transition: border-color 0.15s;
    }
    input:focus { border-color: var(--accent); }
    .remember-row {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 0.78rem;
      color: var(--muted);
      margin-bottom: 12px;
      cursor: pointer;
    }
    input[type="checkbox"] { width: auto; margin: 0; accent-color: var(--accent); }
    .btn-submit {
      width: 100%;
      padding: 10px;
      background: var(--accent);
      border: none;
      border-radius: 4px;
      color: #000;
      font-size: 0.875rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      cursor: pointer;
      font-family: inherit;
      transition: opacity 0.15s;
    }
    .btn-submit:hover { opacity: 0.85; }
    .toggle-row {
      margin-top: 16px;
      font-size: 0.78rem;
      color: var(--muted);
      text-align: center;
    }
    .toggle-row a {
      color: var(--accent);
      text-decoration: none;
      margin-left: 4px;
    }
    .toggle-row a:hover { text-decoration: underline; }
    .error-msg {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.25);
      color: #f87171;
      border-radius: 4px;
      padding: 9px 12px;
      font-size: 0.8rem;
      margin-bottom: 14px;
      display: none;
    }
    .back {
      margin-top: 20px;
      font-size: 0.78rem;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.15s;
    }
    .back:hover { color: var(--text); }
    .opt-in-row {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      font-size: 0.72rem;
      color: var(--muted);
      margin-bottom: 12px;
      line-height: 1.55;
      cursor: pointer;
    }
    .opt-in-row input[type="checkbox"] { flex-shrink: 0; margin-top: 2px; }
  </style>
</head>
<body>

  <div class="wordmark">akFISH<em>info.</em></div>

  <div class="card">
    <h1>Sign in</h1>
    <p class="sub">Real time alerts for PWS.</p>

    <div class="error-msg" id="errorMsg">Sign-in failed. Please try again.</div>

    <a href="/auth/google" class="btn-google">
      <svg width="16" height="16" viewBox="0 0 18 18">
        <path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z"/>
        <path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z"/>
        <path fill="#FBBC05" d="M3.964 10.707A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.707V4.961H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.039l3.007-2.332z"/>
        <path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.961L3.964 7.293C4.672 5.166 6.656 3.58 9 3.58z"/>
      </svg>
      Continue with Google
    </a>

    <div class="divider">or</div>

    <!-- Sign in form -->
    <form id="signin-form" onsubmit="doSignIn(event)">
      <input type="email"    id="si-email"    placeholder="Email"    required autocomplete="email" />
      <input type="password" id="si-password" placeholder="Password" required autocomplete="current-password" />
      <label class="remember-row">
        <input type="checkbox" id="si-remember" /> Stay signed in for 30 days
      </label>
      <button type="submit" class="btn-submit">Sign in</button>
    </form>

    <!-- Sign up form (hidden) -->
    <form id="signup-form" style="display:none" onsubmit="doSignUp(event)">
      <input type="text"     id="su-name"     placeholder="Full name"             required autocomplete="name" />
      <input type="email"    id="su-email"    placeholder="Email"                 required autocomplete="email" />
      <input type="password" id="su-password" placeholder="Password (min 8 chars)" required minlength="8" autocomplete="new-password" />
      <input type="tel"      id="su-phone"    placeholder="Phone number (for SMS alerts)" autocomplete="tel" />
      <label class="opt-in-row" id="su-sms-row" style="display:none">
        <input type="checkbox" id="su-sms-consent" />
        By checking this box, I agree to receive recurring automated SMS alerts from akFISHinfo about ADF&G Prince William Sound fishing openings. Message frequency varies. Msg &amp; data rates may apply. Reply STOP to unsubscribe.
      </label>
      <label class="remember-row">
        <input type="checkbox" id="su-remember" /> Stay signed in for 30 days
      </label>
      <button type="submit" class="btn-submit" id="su-submit">Create account</button>
    </form>

    <div class="toggle-row">
      <span id="toggle-label">Don't have an account?</span>
      <a href="#" id="toggle-link" onclick="toggleForm(event)">Sign up</a>
    </div>
  </div>

  <a href="/" class="back">Back to homepage</a>

  <script>
    if (new URLSearchParams(location.search).get('error')) {
      document.getElementById('errorMsg').style.display = 'block';
    }

    let showingSignUp = false;

    function toggleForm(e) {
      e.preventDefault();
      showingSignUp = !showingSignUp;
      document.getElementById('signin-form').style.display  = showingSignUp ? 'none'  : 'block';
      document.getElementById('signup-form').style.display  = showingSignUp ? 'block' : 'none';
      document.getElementById('toggle-label').textContent   = showingSignUp ? 'Already have an account?' : "Don't have an account?";
      document.getElementById('toggle-link').textContent    = showingSignUp ? 'Sign in' : 'Sign up';
      document.getElementById('errorMsg').style.display     = 'none';
    }

    function showError(msg) {
      const el = document.getElementById('errorMsg');
      el.textContent = msg;
      el.style.display = 'block';
    }

    async function doSignIn(e) {
      e.preventDefault();
      const email       = document.getElementById('si-email').value.trim();
      const password    = document.getElementById('si-password').value;
      const remember_me = document.getElementById('si-remember').checked;
      try {
        const r = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password, remember_me }),
        });
        const d = await r.json();
        if (!r.ok) { showError(d.error || 'Sign-in failed.'); return; }
        window.location.href = d.redirect;
      } catch { showError('Connection error. Please try again.'); }
    }

    function normalizePhone(raw) {
      const digits = raw.replace(/\D/g, '');
      if (digits.length === 10) return '+1' + digits;
      if (digits.length === 11 && digits.startsWith('1')) return '+' + digits;
      return raw;
    }

    // Show SMS consent row only when phone field has a value
    document.getElementById('su-phone').addEventListener('input', function () {
      const row = document.getElementById('su-sms-row');
      row.style.display = this.value.trim() ? 'flex' : 'none';
      if (!this.value.trim()) document.getElementById('su-sms-consent').checked = false;
    });

    async function doSignUp(e) {
      e.preventDefault();
      const name        = document.getElementById('su-name').value.trim();
      const email       = document.getElementById('su-email').value.trim();
      const password    = document.getElementById('su-password').value;
      const remember_me = document.getElementById('su-remember').checked;
      const rawPhone    = document.getElementById('su-phone').value.trim();
      const smsConsent  = document.getElementById('su-sms-consent').checked;

      // If a phone was entered, consent must be checked
      if (rawPhone && !smsConsent) {
        showError('Please check the SMS consent box to receive alerts, or clear the phone field to skip for now.');
        return;
      }

      const body = { name, email, password, remember_me };
      if (rawPhone && smsConsent) {
        body.phone_number = normalizePhone(rawPhone);
        body.sms_consent  = true;
      }

      try {
        const r = await fetch('/api/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });
        const d = await r.json();
        if (!r.ok) { showError(d.error || 'Sign-up failed.'); return; }
        window.location.href = d.redirect;
      } catch { showError('Connection error. Please try again.'); }
    }
  </script>
</body>
</html>
