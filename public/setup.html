<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Setup — akFISHinfo</title>
  <meta name="theme-color" content="#060a0f" data-dynamic>
  <script src="/static/theme.js"></script>
  <link rel="stylesheet" href="/static/theme.css"/>
  <style>
    @font-face {
      font-family: 'Blackbird';
      src: url('/static/projekt-blackbird-v2.otf') format('opentype');
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 50px;
      display: flex;
      align-items: center;
      padding: 0 22px;
      background: rgba(6, 10, 15, 0.95);
      border-bottom: 1px solid var(--border);
    }
    .wordmark {
      font-family: 'Blackbird', sans-serif;
      font-size: 19px;
      letter-spacing: 0.03em;
      color: var(--text);
      user-select: none;
    }
    .wordmark em { font-style: normal; color: var(--accent); }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 28px 26px;
      width: 100%;
      max-width: 400px;
    }
    h1 {
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 4px;
    }
    .greeting { color: var(--accent); }
    .sub {
      color: var(--muted);
      font-size: 0.8rem;
      margin-bottom: 22px;
      line-height: 1.5;
    }
    label {
      display: block;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 6px;
    }
    .hint {
      font-weight: 400;
      text-transform: none;
      letter-spacing: 0;
      font-size: 10px;
    }
    input[type="tel"] {
      width: 100%;
      padding: 10px 12px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text);
      font-size: 0.9rem;
      font-family: inherit;
      margin-bottom: 18px;
      outline: none;
      transition: border-color 0.15s;
    }
    input[type="tel"]:focus { border-color: var(--accent); }
    .btn {
      width: 100%;
      padding: 10px;
      background: var(--accent);
      border: none;
      border-radius: 4px;
      color: #000;
      font-size: 0.875rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      cursor: pointer;
      font-family: inherit;
      transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.85; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .error-msg {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.25);
      color: #f87171;
      border-radius: 4px;
      padding: 9px 12px;
      font-size: 0.8rem;
      margin-bottom: 14px;
      display: none;
    }
    .price-note {
      margin-top: 14px;
      text-align: center;
      font-size: 0.75rem;
      color: var(--muted);
    }
    .price-note strong { color: var(--text); }
    .opt-in {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin-top: 16px;
      margin-bottom: 18px;
    }
    .opt-in input[type="checkbox"] {
      margin-top: 2px;
      flex-shrink: 0;
      accent-color: var(--accent);
      width: 14px;
      height: 14px;
      cursor: pointer;
    }
    .opt-in label {
      font-size: 0.72rem;
      color: var(--muted);
      line-height: 1.55;
      font-weight: 400;
      text-transform: none;
      letter-spacing: 0;
      cursor: pointer;
    }

    .skip-link {
      position: absolute; top: -40px; left: 8px;
      background: var(--accent); color: #000;
      padding: 6px 12px; border-radius: 0 0 4px 4px;
      font-size: 12px; font-weight: 700; text-decoration: none;
      z-index: 9999; transition: top 0.15s;
    }
    .skip-link:focus { top: 0; }
  </style>
</head>
<body>
<button type="button" class="theme-toggle" id="theme-toggle" aria-label="Toggle light/dark mode" title="Toggle light/dark mode" style="position:fixed;top:14px;right:14px;z-index:100"><span class="icon-sun" aria-hidden="true">☀</span><span class="icon-moon" aria-hidden="true">☾</span></button>
<a href="#main" class="skip-link">Skip to content</a>
  <nav>
    <a href="/" style="text-decoration:none"><div class="wordmark">akFISH<em>info.</em></div></a>
  </nav>

  <main id="main">
  <div class="card">
    <h1>Welcome, <span class="greeting" id="greeting">captain</span></h1>
    <p class="sub">Add your phone number to receive SMS alerts when a district opens.</p>

    <form id="setupForm">
      <label for="phone">Phone number <span class="hint">(US number — 10 digits)</span></label>
      <input type="tel" id="phone" placeholder="907 555 0123" required autocomplete="tel" />
      <div class="error-msg" id="errorMsg"></div>

      <div class="opt-in">
        <input type="checkbox" id="smsConsent" required />
        <label for="smsConsent">
          By checking this box, I agree to receive recurring automated SMS alerts from akFISHinfo about ADF&G Prince William Sound fishing openings. Message frequency varies. Message &amp; data rates may apply. Reply STOP to unsubscribe at any time.
        </label>
      </div>

      <button type="submit" class="btn" id="submitBtn" disabled>Continue</button>
    </form>

    <p class="price-note">7-day free trial, then <strong>$30/month</strong>. One trial per phone number.</p>
    <p class="price-note" style="margin-top:6px">
      By continuing you agree to our
      <a href="/terms" style="color:var(--accent);text-decoration:none">Terms of Service</a>
      and <a href="/privacy" style="color:var(--accent);text-decoration:none">Privacy Policy</a>.
    </p>
  </div>
  </main>

  <script>
    function normalizePhone(raw) {
      const digits = raw.replace(/\D/g, '');
      if (digits.length === 10) return '+1' + digits;
      if (digits.length === 11 && digits.startsWith('1')) return '+' + digits;
      return '+' + digits; // best effort
    }

    document.getElementById('smsConsent').addEventListener('change', function () {
      document.getElementById('submitBtn').disabled = !this.checked;
    });

    fetch('/api/me').then(r => r.json()).then(({ user }) => {
      if (!user) { location.href = '/login'; return; }
      if (user.phone_number) {
        location.href = user.has_access ? '/app' : '/pricing';
        return;
      }
      const first = (user.name || '').split(' ')[0];
      if (first) document.getElementById('greeting').textContent = first;
    });

    document.getElementById('setupForm').addEventListener('submit', async e => {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      const err = document.getElementById('errorMsg');
      err.style.display = 'none';
      btn.disabled = true;
      btn.textContent = 'Redirecting...';
      try {
        const r = await fetch('/api/setup', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ phone_number: normalizePhone(document.getElementById('phone').value) }),
        });
        const d = await r.json();
        if (!r.ok) throw new Error(d.error || 'Setup failed');
        window.location.href = d.redirect;
      } catch (e) {
        err.textContent = e.message;
        err.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Continue';
      }
    });
  </script>
</body>
</html>
