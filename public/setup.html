<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Setup — akFISHinfo</title>
  <style>
    @font-face {
      font-family: 'Blackbird';
      src: url('/static/projekt-blackbird-v2.otf') format('opentype');
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:      #060a0f;
      --surface: #0d1520;
      --border:  #1a2d3f;
      --text:    #dde8f4;
      --muted:   #5a7288;
      --accent:  #00b4d8;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 50px;
      display: flex;
      align-items: center;
      padding: 0 22px;
      background: rgba(6, 10, 15, 0.95);
      border-bottom: 1px solid var(--border);
    }
    .wordmark {
      font-family: 'Blackbird', sans-serif;
      font-size: 19px;
      letter-spacing: 0.03em;
      color: var(--text);
      user-select: none;
    }
    .wordmark em { font-style: normal; color: var(--accent); }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 28px 26px;
      width: 100%;
      max-width: 400px;
    }
    h1 {
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 4px;
    }
    .greeting { color: var(--accent); }
    .sub {
      color: var(--muted);
      font-size: 0.8rem;
      margin-bottom: 22px;
      line-height: 1.5;
    }
    label {
      display: block;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 6px;
    }
    .hint {
      font-weight: 400;
      text-transform: none;
      letter-spacing: 0;
      font-size: 10px;
    }
    input[type="tel"] {
      width: 100%;
      padding: 10px 12px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text);
      font-size: 0.9rem;
      font-family: inherit;
      margin-bottom: 18px;
      outline: none;
      transition: border-color 0.15s;
    }
    input[type="tel"]:focus { border-color: var(--accent); }
    .btn {
      width: 100%;
      padding: 10px;
      background: var(--accent);
      border: none;
      border-radius: 4px;
      color: #000;
      font-size: 0.875rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      cursor: pointer;
      font-family: inherit;
      transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.85; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .error-msg {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.25);
      color: #f87171;
      border-radius: 4px;
      padding: 9px 12px;
      font-size: 0.8rem;
      margin-bottom: 14px;
      display: none;
    }
    .price-note {
      margin-top: 14px;
      text-align: center;
      font-size: 0.75rem;
      color: var(--muted);
    }
    .price-note strong { color: var(--text); }
  </style>
</head>
<body>
  <nav>
    <a href="/" style="text-decoration:none"><div class="wordmark">akFISH<em>info.</em></div></a>
  </nav>

  <div class="card">
    <h1>Welcome, <span class="greeting" id="greeting">captain</span></h1>
    <p class="sub">Add your phone number to receive SMS alerts when a district opens.</p>

    <form id="setupForm">
      <label>Phone number <span class="hint">(include country code, e.g. +19075550123)</span></label>
      <input type="tel" id="phone" placeholder="+1 907 555 0123" required autocomplete="tel" />
      <div class="error-msg" id="errorMsg"></div>
      <button type="submit" class="btn" id="submitBtn">Continue</button>
    </form>

    <p class="price-note">7-day free trial, then <strong>$15/month</strong>. One trial per phone number.</p>
  </div>

  <script>
    fetch('/api/me').then(r => r.json()).then(({ user }) => {
      if (!user) { location.href = '/login'; return; }
      if (user.phone_number) {
        location.href = user.has_access ? '/app' : '/pricing';
        return;
      }
      const first = (user.name || '').split(' ')[0];
      if (first) document.getElementById('greeting').textContent = first;
    });

    document.getElementById('setupForm').addEventListener('submit', async e => {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      const err = document.getElementById('errorMsg');
      err.style.display = 'none';
      btn.disabled = true;
      btn.textContent = 'Redirecting...';
      try {
        const r = await fetch('/api/setup', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ phone_number: document.getElementById('phone').value }),
        });
        const d = await r.json();
        if (!r.ok) throw new Error(d.error || 'Setup failed');
        window.location.href = d.redirect;
      } catch (e) {
        err.textContent = e.message;
        err.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Continue';
      }
    });
  </script>
</body>
</html>
