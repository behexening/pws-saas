<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Complete Setup — AK Fish Info</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0d1117;
            color: #e6edf3;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }
        .card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 2.5rem 2rem;
            max-width: 420px;
            width: 100%;
        }
        h1 { font-size: 1.4rem; margin-bottom: 0.4rem; }
        .sub { color: #8b949e; font-size: 0.9rem; margin-bottom: 2rem; }
        .greeting { color: #58a6ff; font-weight: 600; }
        label {
            display: block;
            font-weight: 600;
            color: #e6edf3;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
        }
        .hint { color: #8b949e; font-size: 0.8rem; font-weight: 400; }
        input[type="tel"] {
            width: 100%;
            padding: 10px 12px;
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 6px;
            color: #e6edf3;
            font-size: 1rem;
            margin-bottom: 1.5rem;
        }
        input[type="tel"]:focus {
            outline: none;
            border-color: #58a6ff;
            box-shadow: 0 0 0 3px rgba(88, 166, 255, 0.1);
        }
        .btn {
            width: 100%;
            padding: 12px;
            background: #238636;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.15s;
        }
        .btn:hover { background: #2ea043; }
        .btn:disabled { background: #1b4020; color: #666; cursor: not-allowed; }
        .error-msg {
            background: #3d1a1a;
            border: 1px solid #7d2d2d;
            color: #f87171;
            border-radius: 6px;
            padding: 0.75rem 1rem;
            font-size: 0.85rem;
            margin-bottom: 1rem;
            display: none;
        }
        .price-note {
            text-align: center;
            color: #8b949e;
            font-size: 0.8rem;
            margin-top: 1rem;
        }
        .price-note strong { color: #e6edf3; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Almost there, <span class="greeting" id="greeting">captain</span></h1>
        <p class="sub">We need your phone number to send SMS alerts.</p>

        <form id="setupForm">
            <label>
                Phone number <span class="hint">(include country code, e.g. +19075550123)</span>
            </label>
            <input type="tel" id="phone" name="phone_number"
                   placeholder="+1-907-555-0123" required autocomplete="tel">

            <div class="error-msg" id="errorMsg"></div>

            <button type="submit" class="btn" id="submitBtn">
                Start free trial →
            </button>
        </form>

        <p class="price-note">7 days free, then <strong>$15/month</strong>. One trial per phone number.</p>
    </div>

    <script>
        // Pre-fill greeting from session user
        fetch('/api/me')
            .then(r => r.json())
            .then(({ user }) => {
                if (!user) { location.href = '/login'; return; }
                // Server handles redirect if phone already set, but guard here too
                if (user.phone_number) {
                    location.href = user.has_access ? '/app' : '/pricing';
                    return;
                }
                const firstName = (user.name || '').split(' ')[0];
                if (firstName) document.getElementById('greeting').textContent = firstName;
            });

        document.getElementById('setupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const errorDiv = document.getElementById('errorMsg');
            errorDiv.style.display = 'none';
            btn.disabled = true;
            btn.textContent = 'Redirecting…';

            try {
                const resp = await fetch('/api/setup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phone_number: document.getElementById('phone').value }),
                });
                const data = await resp.json();
                if (!resp.ok) throw new Error(data.error || 'Setup failed');
                window.location.href = data.redirect;
            } catch (err) {
                errorDiv.textContent = '❌ ' + err.message;
                errorDiv.style.display = 'block';
                btn.disabled = false;
                btn.textContent = 'Continue to Payment →';
            }
        });
    </script>
</body>
</html>
